name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecc_ci?schema=public
  SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecc_ci_shadow?schema=public
  AUTH_SECRET: ci-only-auth-secret-with-more-than-thirty-two-characters
  APP_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
  EMAIL_PROVIDER: mock
  ENABLE_MOCK_PAYMENTS: "true"
  INTERNAL_API_TOKEN: ci-only-internal-token
  CUSTOMER_ORDER_AREA_BASE_URL: http://127.0.0.1:3000
  CUSTOMER_ORDER_CHECKOUT_BASE_URL: http://127.0.0.1:3000
  BETA_BASE_URL: http://127.0.0.1:3000
  BETA_PORT: "3000"
  TENANT_AB_BASE_URL: http://127.0.0.1:3000
  WAREHOUSE_SCOPE_BASE_URL: http://127.0.0.1:3000
  DISTRIBUTOR_PRIVACY_BASE_URL: http://127.0.0.1:3000
  RETENTION_HOLD_BASE_URL: http://127.0.0.1:3000

jobs:
  quality:
    name: Prisma, lint, build and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Use repository npm version
        run: npm install -g npm@11.6.2

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate CI configuration
        run: npm run test:ci-config

      - name: Validate security headers
        run: npm run test:security-headers

  critical-smoke:
    name: Critical PostgreSQL smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecc_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecc_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Use repository npm version
        run: npm install -g npm@11.6.2

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed isolated CI database
        run: npm run prisma:seed

      - name: Start shared test server
        shell: bash
        run: |
          setsid npm run dev > /tmp/flyero-dev.log 2>&1 &
          echo $! > /tmp/flyero-dev.pid
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/flyero-dev.log
          exit 1

      - name: Authentication UX smoke
        run: npm run test:auth-ux

      - name: Database-authorized session smoke
        run: npm run test:auth-session

      - name: Tenant foundation smoke
        run: npm run test:tenant-foundation

      - name: Area tenant scope smoke
        run: npm run test:area-tenant-scope

      - name: Tenant A/B IDOR smoke
        run: npm run test:tenant-ab-idor

      - name: Authentication abuse protection smoke
        run: npm run test:auth-abuse

      - name: Public abuse protection smoke
        run: npm run test:public-abuse

      - name: Payment reconciliation contract smoke
        run: npm run test:payment-reconciliation

      - name: Payment dispute contract smoke
        run: npm run test:payment-dispute

      - name: File scan contract smoke
        run: npm run test:file-scan

      - name: Tenant policy contract smoke
        run: npm run test:tenant-policy

      - name: Password reset smoke
        run: npm run test:password-reset

      - name: Password reset live smoke
        run: npm run test:password-reset-live

      - name: Permission matrix smoke
        run: npm run test:permissions

      - name: Audit log context smoke
        run: npm run test:audit-log-v2

      - name: Retention policy smoke
        run: npm run test:retention

      - name: Retention hold contract smoke
        run: npm run test:retention-hold

      - name: Retention hold runtime smoke
        run: npm run test:retention-hold-runtime

      - name: Upload security smoke
        run: npm run test:upload-security

      - name: Protected download headers smoke
        run: npm run test:protected-download-headers

      - name: Public artifact privacy smoke
        run: npm run test:public-artifact-privacy

      - name: Private object storage smoke
        run: npm run test:private-storage

      - name: Backup configuration smoke
        run: npm run backup:config

      - name: Production storage layout smoke
        run: npm run test:storage-layout

      - name: Document review tenant scope smoke
        run: npm run test:document-review-tenant-scope

      - name: Pricing system linkage smoke
        run: npm run test:pricing-system-linkage

      - name: Tenant audit context smoke
        run: npm run test:tenant-audit-context

      - name: Operational documentation smoke
        run: npm run test:operational-docs

      - name: Backup scheduler smoke
        run: npm run test:backup-scheduler

      - name: Backup verification contract smoke
        run: node tests/backup-verification-smoke.mjs

      - name: Analytics tenant scope smoke
        run: npm run test:analytics-tenant-scope

      - name: Dispatch tenant scope smoke
        run: npm run test:dispatch-tenant-scope

      - name: Logistics tenant scope smoke
        run: npm run test:logistics-tenant-scope

      - name: Warehouse scope smoke
        run: npm run test:warehouse-scope

      - name: Warehouse privacy smoke
        run: npm run test:warehouse-privacy
      - name: Internal response privacy smoke
        run: npm run test:internal-response-privacy
      - name: Health fail-safe smoke
        run: npm run test:health-failsafe
      - name: Payment production guard smoke
        run: npm run test:payment-production-guard
      - name: Print order tenant scope smoke
        run: npm run test:print-order-tenant-scope

      - name: Support permission smoke
        run: npm run test:support-permission

      - name: Distributor privacy smoke
        run: npm run test:distributor-privacy

      - name: Proof download privacy smoke
        run: npm run test:proof-download-privacy

      - name: Route analysis privacy smoke
        run: npm run test:route-analysis-privacy

      - name: Maps abuse smoke
        run: npm run test:maps-abuse

      - name: Auth session management smoke
        run: npm run test:auth-session-management
      - name: Pricing admin propagation smoke
        run: npm run test:pricing-admin-propagation
      - name: CSRF origin smoke
        run: npm run test:csrf-origin

      - name: Health fail-safe contract smoke
        run: npm run test:health-fail-safe

      - name: Request-ID propagation contract smoke
        run: npm run test:request-id-propagation

      - name: Production preflight contract smoke
        run: npm run test:production-preflight

      - name: Report evidence tenant scope smoke
        run: npm run test:report-evidence-tenant-scope

      - name: Launch hardening smoke
        run: npm run test:module25

      - name: Public landing smoke
        run: npm run test:module16-landing

      - name: Area data import smoke
        run: npm run test:area-data-import

      - name: Customer area calculation smoke
        run: npm run test:customer-order-area

      - name: Customer checkout smoke
        run: npm run test:customer-order-checkout

      - name: Distribution report smoke
        run: npm run test:distribution-reports

      - name: External evidence report smoke
        run: npm run test:external-distribution-report

      - name: Full beta flow
        run: npm run test:beta

      - name: Show shared test server log on failure
        if: failure()
        run: cat /tmp/flyero-dev.log || true

      - name: Stop shared test server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/flyero-dev.pid ]; then
            kill -- -"$(cat /tmp/flyero-dev.pid)" || true
          fi
